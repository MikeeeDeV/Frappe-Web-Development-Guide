<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cookie Banner — Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f0f7ff 0%, #fafafa 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      color: #1e293b;
    }
    h2 { font-size: 20px; font-weight: 600; }
    p  { font-size: 13px; color: #64748b; }
    button {
      padding: 10px 24px;
      background: #2490e3; color: #fff;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #1a7fd4; }
  </style>
</head>
<body>
  <h2>Cookie Banner Preview</h2>
  <p>The banner appears automatically on load.</p>
  <button onclick="localStorage.removeItem('cookie_consent'); location.reload()">Reset &amp; Show Banner</button>
  <script src="cookie-banner.js"></script>
</body>
</html>
